name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Build release package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate annotated release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git cat-file -e "$RELEASE_TAG^{tag}"
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          version="${RELEASE_TAG#v}"
          grep -Fq "version: \"$version\"" extension.yml
          python3 - "$version" <<'PY'
          import json
          import sys

          version = sys.argv[1]
          catalog = json.load(open("catalog.json", encoding="utf-8"))
          entry = catalog["extensions"]["github-issue-canon"]
          if entry["version"] != version:
              raise SystemExit("catalog version does not match the release tag")
          PY

      - name: Build deterministic package
        run: |
          python3 scripts/build_release.py --output dist
          (cd dist && sha256sum --check ./*.sha256)

      - name: Verify catalog checksum
        run: |
          expected="$(python3 -c 'import json; print(json.load(open("catalog.json"))["extensions"]["github-issue-canon"]["sha256"])')"
          actual="$(cut -d ' ' -f 1 -- dist/*.sha256)"
          test "$actual" = "$expected"

      - name: Upload immutable package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # Required only for `gh release create` after packaging succeeds.
    steps:
      - name: Download verified package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: dist

      - name: Verify downloaded package
        run: cd dist && sha256sum --check ./*.sha256

      - name: Publish from annotated tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          gh release create "$RELEASE_TAG"
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --title "$RELEASE_TAG - tested-issue-canon"
          --notes-from-tag
          ./dist/*.zip
          ./dist/*.sha256
