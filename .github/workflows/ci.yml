name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit and package tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Compile Python sources
        run: python3 -m compileall -q scripts tests

      - name: Run unit tests
        run: python3 -m unittest discover -v

      - name: Build deterministic release package
        run: |
          python3 scripts/build_release.py --output dist
          (cd dist && sha256sum --check ./*.sha256)

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/$archive"
          echo "$ACTIONLINT_SHA256  $RUNNER_TEMP/$archive" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Lint workflow syntax
        run: actionlint

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: ""
          cache-suffix: zizmor-1.27.0
          prune-cache: false
          ignore-nothing-to-cache: true

      - name: Audit workflow security
        run: uvx --from zizmor==1.27.0 zizmor --pedantic .

  required:
    name: CI / required
    if: ${{ always() }}
    needs:
      - test
      - workflow-security
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every CI lane
        env:
          TEST_RESULT: ${{ needs.test.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
        run: |
          test "$TEST_RESULT" = success
          test "$WORKFLOW_SECURITY_RESULT" = success
