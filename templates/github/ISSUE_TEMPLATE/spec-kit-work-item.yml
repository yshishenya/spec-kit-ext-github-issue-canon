name: Spec Kit задача
description: Создать issue, связанный со Spec Kit задачей, review, hardening или документацией.
title: "[012][P0][area] Коротко опиши результат по-русски"
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Используй canonical title format: `[<feature>][<priority>][<area>] <результат простыми словами>`.
        Пример: `[012][P0][ingest/finalize] Отклонять несовпадающие manifest до finalize`

  - type: input
    id: summary
    attributes:
      label: Кратко
      description: Одно-два предложения: что должно стать правдой.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Оставь названия пунктов и заполни значения.
      value: |
        - Фича: `012-server-ingest-foundation`
        - Приоритет: `P1`
        - Область: `ingest`
        - Spec tasks: T000
        - Источник: review / analyze / implementation / user report / production incident
        - Гейт: blocks PR / blocks deployment / follow-up / nice-to-have
        - Связанные issues:
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Что сейчас не так, какой риск есть, и почему это важно.
    validations:
      required: true

  - type: textarea
    id: confirmed-findings
    attributes:
      label: Проверенные факты
      description: Пиши факты, недостающий proof или проверенные review findings. Не додумывай.
      value: |
        - 
        - 
        - 
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Границы задачи
      description: Явно раздели, что входит и что не входит.
      value: |
        Входит:
        - 

        Не входит:
        - 
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Критерии приемки
      description: Используй чекбоксы. Для поведения лучше Given/When/Then.
      value: |
        - [ ] Given ..., when ..., then ...
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: validation-required
    attributes:
      label: Что проверить перед закрытием
      description: Перечисли evidence, без которого issue нельзя закрывать.
      value: |
        - [ ] Test file or command:
        - [ ] Contract/checklist/compose/manual smoke evidence:
        - [ ] Documentation/status update if required:
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Заметки по реализации
      description: Ограничения, важные пути, порядок работ или известные ловушки. Пиши практично.
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: Ссылки
      description: Дай ссылки на Spec Kit artifacts, PR и связанные issues.
      value: |
        - Spec:
        - Plan:
        - Tasks:
        - Связано:
    validations:
      required: true

  - type: checkboxes
    id: canon-confirmation
    attributes:
      label: Подтверждение canon
      options:
        - label: Title следует формату `[<feature>][<priority>][<area>] <результат простыми словами>`.
          required: true
        - label: Критерии приемки и validation evidence достаточно конкретны, чтобы понять, когда issue можно закрывать.
          required: true
