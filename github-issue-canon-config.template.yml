# GitHub Issue Canon configuration

# Canon title shape: [{feature}][{priority}][{area}] {outcome}
title_format: "[{feature}][{priority}][{area}] {outcome}"

# Default feature label used when the feature cannot be inferred from tasks.md.
default_feature: null

# If true, the after_taskstoissues hook may normalize freshly created issues
# when enough task/context information is available.
normalize_after_taskstoissues: true

# If true, validation exits non-zero when open Spec Kit issues violate the canon.
fail_on_invalid: true

# GitHub issue labels managed by the extension.
labels:
  needs-triage:
    color: "ededed"
    description: "Needs initial classification against the issue canon"
  priority:P0:
    color: "b60205"
    description: "Critical blocker: correctness, security, privacy, or data loss"
  priority:P1:
    color: "d93f0b"
    description: "High priority blocker before PR or deployment readiness"
  priority:P2:
    color: "fbca04"
    description: "Medium priority follow-up or hardening"
  priority:P3:
    color: "0e8a16"
    description: "Low priority polish or cleanup"
  gate:pr-blocker:
    color: "b60205"
    description: "Must be resolved before PR-ready claim"
  gate:deployment-blocker:
    color: "d93f0b"
    description: "Must be resolved before deployment-plan or production readiness claim"
  type:bug:
    color: "d73a4a"
    description: "Confirmed defect or incorrect behavior"
  type:hardening:
    color: "fbca04"
    description: "Hardening, safety, privacy, durability, or operational robustness"
  type:docs:
    color: "0075ca"
    description: "Documentation/status/runbook issue"
  type:test-gap:
    color: "0e8a16"
    description: "Missing, weak, or misleading validation coverage"
  type:feature:
    color: "a2eeef"
    description: "New capability or feature work"

default_areas:
  auth:
    color: "5319e7"
    description: "Authentication, authorization, tenant, user, and device boundaries"
  contract:
    color: "0366d6"
    description: "OpenAPI, API contracts, schemas, Problem responses"
  docs:
    color: "0075ca"
    description: "Documentation, quickstart, status, PRD, runbook"
  infra:
    color: "0052cc"
    description: "Docker, compose, runtime, migrations, deployment infrastructure"
  ingest:
    color: "1d76db"
    description: "Server ingest API, lifecycle, finalize, and status"
  macos:
    color: "c2e0c6"
    description: "macOS app, driver, audio routing, native capture"
  observability:
    color: "0b7285"
    description: "Logging, tracing, metrics, diagnostics, redaction"
  security:
    color: "ee0701"
    description: "Security, privacy, redaction, secrets, audit"
  storage:
    color: "006b75"
    description: "Object storage, MinIO, artifact persistence"
  tests:
    color: "0e8a16"
    description: "Test coverage, test fakes, validation proof gates"
  ux:
    color: "d4c5f9"
    description: "User experience, interaction, copy, accessibility"
